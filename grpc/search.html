ntified access key for the targeted account.\nunrestricted_unidentified_access\nWhether the account has enabled sealed sender from anyone.\ncapabilities\nA list of capabilities enabled on the account.\nbadges\nA list of badges associated with the account.\norg\nsignal\nchat\nprofile\nGetVersionedProfileAnonymousRequest\nrequest\nContains the data necessary to request a versioned profile.\nunidentified_access_key\nThe unidentified access key for the targeted account.\norg\nsignal\nchat\nprofile\nGetVersionedProfileAnonymousResponse\nresult\n\nnot_found\n\nfailed_unidentified_authorization\n\norg\nsignal\nchat\nprofile\nGetVersionedProfileRequest\naccountIdentifier\nThe ACI of the account for which to get profile data.\nversion\nThe profile version to retrieve.\ndata_etag\nThe `data_etag` from the previous request for this Profile version. If\n unchanged, the response will omit `data` and `data_etag_matched` will be\n `true`.\npayment_address_etag\nThe `payment_address_etag` from the previous request for this account\u2019s\n profile. If unchanged, the response will omit `payment_address` and\n `payment_address_etag_matched` will be `true`.\norg\nsignal\nchat\nprofile\nGetVersionedProfileResponse\nresult\n\nnot_found\n\norg\nsignal\nchat\nprofile\nGetVersionedProfileResult\ndata_etag\nThe ciphertext of a serialized Profile.\n Absent if a v2 Profile is not available\n for this version, in which the client should use `v1_response`.\ndata_etag_matched\nIndicates that the request\u2019s ETag matched the stored `data`\npayment_address_data_etag\nThe ciphertext of the MobileCoin wallet ID on the profile.\npayment_address_etag_matched\nIndicates that the request\u2019s ETag matched the stored `payment_address`\nv1_response\nWill be present if there is no v2 Profile data for this version.\n\n Because this is a temporary field during the migration, it has the highest\n field number without serialization overhead. This is purely aesthetic.\norg\nsignal\nchat\nprofile\nGetVersionedProfileV1Response\nname\nThe ciphertext of the name on the profile.\nabout\nThe ciphertext of the description on the profile.\nabout_emoji\nThe ciphertext of the emoji on the profile.\navatar\nThe cdn0 path of the avatar on the profile.\nphone_number_sharing\nThe ciphertext of the phone-number sharing setting on the profile.\norg\nsignal\nchat\nprofile\nPaymentsForbiddenInRegion\norg\nsignal\nchat\nprofile\nProfileAvatarUploadAttributes\npath\nThe S3 upload path for the profile's avatar.\ncredential\nA scoped credential. Includes the AWS access key, date, region targeted, and AWS service.\nacl\nThe type of access control for the avatar object.\nalgorithm\nThe algorithm used to calculate a signature on the S3 policy.\ndate\nThe timestamp at which the S3 policy and signature were generated.\npolicy\nThe S3 policy used to upload the avatar object.\nsignature\nA digital signature on the S3 policy.\norg\nsignal\nchat\nprofile\nProfilesV2CapabilityRequired\norg\nsignal\nchat\nprofile\nSetProfileRequest\nversion\nThe profile version. Required.\ndata\nThe ciphertext of a serialized Profile protobuf. Required.\n 937 max length = 909 plaintext serialization + 28 bytes encryption overhead\nexpected_current_data_hash\nThe SHA-256 hash of the Profile ciphertext being replaced.\n This is used an optimistic lock against concurrent changes.\n\n Optional, if this is the initial request to create a version.\nexpected_current_version\nThe current profile version being updated.\n This is used as an optimistic lock against concurrent changes.\n\n Optional, if there is no current profile version for the account.\npayment_address\nThe ciphertext of the MobileCoin wallet ID on the profile.\nbadge_ids\nA list of badge IDs associated with the profile.\ncommitment\nThe profile key commitment. Used to issue a profile key credential response.\n\n Required during the v1 -> v2 migration period. Afterwards will be optional, if this is an update to an existing version.\nv1Request\nAn embedded v1 request. Required during the v1 -> v2 migration period.\n\n Because this is a temporary field during the migration, it has the highest\n field number without serialization overhead. This is purely aesthetic.\norg\nsignal\nchat\nprofile\nSetProfileResponse\nresult\n\nexpected_data_write_conflict\nThe current data hash did not match the request's expectation, indicating\n another device on the account may have written an update the caller does not know about.\npayments_forbidden_in_region\nPayments are not permitted in the account's region, based on its phone number.\n The request should be retried without `payment_address.\nexpected_version_write_conflict\nThe current version did not match the request's expectation, indicating\n another device on the account may have created a new version the caller does not know about.\nprofiles_v2_capability_required\nBecause this is a temporary field during the migration, it has the highest\n field number without serialization overhead. This is purely aesthetic.\norg\nsignal\nchat\nprofile\nSetProfileResult\nv1_avatar_upload_form\nIf the request included a v1 avatar change, this field contains the policy\n and credential used by clients to upload an avatar to the CDN.\n\n Because this is a temporary field during the migration, it has the highest\n field number without serialization overhead. This is purely aesthetic.\norg\nsignal\nchat\nprofile\nSetProfileV1Request\nname\nThe ciphertext of a name that users must set on the profile.\navatar_change\nAn enum to indicate what change, if any, is made to the avatar with this request.\nabout_emoji\nThe ciphertext of an emoji that users can set on their profile.\nabout\nThe ciphertext of a description that users can set on their profile.\nphone_number_sharing\nThe ciphertext of the phone-number sharing setting on the profile. 29-byte encrypted boolean.\norg\nsignal\nchat\nprofile\nSetProfileV1Request\nAvatarChange\n\nAVATAR_CHANGE_UNCHANGED\n\nAVATAR_CHANGE_CLEAR\n\nAVATAR_CHANGE_UPDATE\n\norg\nsignal\nchat\nprofile\nCredentialType\n\nCREDENTIAL_TYPE_UNSPECIFIED\n\nCREDENTIAL_TYPE_EXPIRING_PROFILE_KEY\n\n"}, "org.signal.chat.require": {"package": "org.signal.chat.require", "url": "org.signal.chat.require.html", "content": "org.signal.chat.require\n\norg\nsignal\nchat\nrequire\nSizeConstraint\nmin\n\nmax\n\norg\nsignal\nchat\nrequire\nValueRangeConstraint\nmin\n\nmax\n\norg\nsignal\nchat\nrequire\nAuth\n\nAUTH_UNSPECIFIED\n\nAUTH_ONLY_AUTHENTICATED\n\nAUTH_ONLY_ANONYMOUS\n\norg\nsignal\nchat\nrequire\nIdentityType\nThis is duplicated from common.proto because:\n\n 1. importing would be a circular dependency\n 2. the canonical declaration belongs there\nIDENTITY_TYPE_UNSPECIFIED\n\nIDENTITY_TYPE_ACI\n\nIDENTITY_TYPE_PNI\n\n"}, "org.signal.chat.tag": {"package": "org.signal.chat.tag", "url": "org.signal.chat.tag.html", "content": "org.signal.chat.tag\n\n"}};

    function displaySearchResults() {
        const query = new URLSearchParams(window.location.search).get('query');

        if (query) {
            document.getElementById('mainInputQuery').value = query;

            const results = idx.query(function (q) {
              words = query.toLowerCase().split(" "); // toLowerCase() is needed to make the search case insensitive.
              for (n in words) {
                const word = words[n];
